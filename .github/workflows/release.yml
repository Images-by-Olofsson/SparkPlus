# =============================================================
# Spark + - Automated Release Pipeline
# =============================================================
# Triggers when PROD-READY-SETUP.zip is updated in PROD/SparkPlus/
#
# Version source: manifest.json inside PROD-READY-SETUP.zip
# The version is NEVER generated by this workflow. It is always
# read from the addon package itself to ensure consistency.
#
# Steps:
#   1. Read the OLD version from version.txt (before this push)
#   2. Extract the NEW version from manifest.json in the ZIP
#   3. Validate that manifest.json and version.txt inside the ZIP match
#   4. Archive the previous ZIP with the old version name
#   5. Log the replacement in ROLLBACK_LOG.md (with date)
#   6. Write the new version to version.txt (PROD + root)
#   7. Commit and push
# =============================================================

name: Spark + Release Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'PROD/SparkPlus/PROD-READY-SETUP.zip'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read old version from version.txt
        id: old_version
        run: |
          if [ -f "PROD/SparkPlus/version.txt" ]; then
            OLD_VERSION=$(cat PROD/SparkPlus/version.txt | tr -d '[:space:]')
          else
            OLD_VERSION="unknown"
          fi
          echo "version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Old version: $OLD_VERSION"

      - name: Extract new version from manifest.json in ZIP
        id: new_version
        run: |
          mkdir -p /tmp/sparkplus-extract
          unzip -o PROD/SparkPlus/PROD-READY-SETUP.zip -d /tmp/sparkplus-extract > /dev/null

          MANIFEST=$(find /tmp/sparkplus-extract -name "manifest.json" -type f | head -1)
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: manifest.json not found in ZIP"
            exit 1
          fi

          NEW_VERSION=$(python3 -c "import json; print(json.load(open('$MANIFEST'))['version'])")
          echo "version=V${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "New version from manifest: V${NEW_VERSION}"

      - name: Validate version consistency inside ZIP
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          ZIP_VERSION_FILE=$(find /tmp/sparkplus-extract -name "version.txt" -type f | head -1)
          if [ -n "$ZIP_VERSION_FILE" ]; then
            ZIP_VERSION=$(cat "$ZIP_VERSION_FILE" | tr -d '[:space:]')
            echo "version.txt inside ZIP: $ZIP_VERSION"
            echo "manifest.json version:  $NEW_VERSION"

            if [ "$ZIP_VERSION" != "$NEW_VERSION" ]; then
              echo ""
              echo "========================================================"
              echo "  VALIDATION FAILED"
              echo "  manifest.json version ($NEW_VERSION) does not match"
              echo "  version.txt inside ZIP ($ZIP_VERSION)."
              echo "  Please ensure both files have the same version"
              echo "  before pushing a new release."
              echo "========================================================"
              rm -rf /tmp/sparkplus-extract
              exit 1
            fi
            echo "Validation passed: manifest.json and version.txt match."
          else
            echo "WARNING: No version.txt found inside ZIP. Skipping validation."
          fi

          rm -rf /tmp/sparkplus-extract

      - name: Archive previous package
        run: |
          OLD_VERSION="${{ steps.old_version.outputs.version }}"
          ARCHIVE_NAME="PROD-READY-SETUP-${OLD_VERSION}.zip"

          git show HEAD~1:PROD/SparkPlus/PROD-READY-SETUP.zip > "DEV/old/${ARCHIVE_NAME}" 2>/dev/null || true
          echo "Archived previous package as DEV/old/${ARCHIVE_NAME}"

      - name: Update rollback log
        run: |
          OLD_VERSION="${{ steps.old_version.outputs.version }}"
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          TODAY=$(date -u +'%Y-%m-%d')

          echo "| ${TODAY} | ${OLD_VERSION} | Replaced by ${NEW_VERSION} | Archived |" >> DEV/old/ROLLBACK_LOG.md
          echo "Updated ROLLBACK_LOG.md"

      - name: Update version files
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          echo "${NEW_VERSION}" > PROD/SparkPlus/version.txt
          cp PROD/SparkPlus/version.txt version.txt

          echo "Updated version to ${NEW_VERSION}"

      - name: Commit and push changes
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add DEV/old/ PROD/SparkPlus/version.txt version.txt
          git commit -m "Release ${NEW_VERSION} - automated pipeline" || echo "No changes to commit"
          git push origin main
